<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #111827;
    }
    .header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      padding: 16px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 4px; }
    .content { padding: 16px; }
    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: white;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid #e5e7eb;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: #2563eb; }
    .stat-label { font-size: 12px; color: #6b7280; }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }
    .status-dot.active { background: #22c55e; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px; }
    .field input {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #e5e7eb; color: #374151; margin-top: 8px; }
    .btn-secondary:hover { background: #d1d5db; }
    .separator { border-top: 1px solid #e5e7eb; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AppartUpgrade</h1>
    <p>Capture d'annonces Marketplace</p>
  </div>

  <div class="content">
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Vérification...</span>
    </div>

    <div class="stat">
      <div>
        <div class="stat-label">Annonces détectées</div>
        <div class="stat-value" id="detectedCount">—</div>
      </div>
      <div>
        <div class="stat-label">Total capturées</div>
        <div class="stat-value" id="totalCount">—</div>
      </div>
    </div>

    <button class="btn btn-primary" id="captureBtn">
      Capturer toutes les annonces visibles
    </button>

    <div class="separator"></div>

    <div class="field">
      <label>User ID (depuis l'app)</label>
      <input type="text" id="userId" placeholder="Ton user ID AppartUpgrade">
    </div>
    <div class="field">
      <label>URL de l'API</label>
      <input type="text" id="apiUrl" placeholder="http://localhost:8000/api/v1">
    </div>

    <button class="btn btn-secondary" id="saveBtn">Sauvegarder les paramètres</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
